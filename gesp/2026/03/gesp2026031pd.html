<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026年3月 一级 判断题</title>
  <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      padding: 15px;
      background-color: #121212;
      color: #e0e0e0;
      line-height: 1.6;
      margin: 0;
      min-height: 100vh;
    }
    
    h1, h2 {
      color: #ffffff;
      margin-top: 0;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
      word-wrap: break-word;
    }
    
    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    
    h2 {
      font-size: 1.3rem;
      margin-top: 25px;
    }
    
    .question {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #1a1a1a;
      border-radius: 10px;
      border-left: 4px solid #ffc107;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    
    .question p {
      margin-top: 0;
      margin-bottom: 15px;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .question small {
      color: #aaa;
      font-size: 0.9rem;
    }
    
    .judge-options {
      display: flex;
      gap: 20px;
      margin: 15px 0;
    }
    
    label {
      flex: 1;
      display: flex;
      padding: 14px 16px;
      margin: 0;
      background-color: #252525;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      font-size: 1rem;
      min-height: 56px;
      align-items: center;
      justify-content: center;
    }
    
    label:active {
      background-color: #2d2d2d;
      transform: scale(0.98);
    }
    
    input[type="radio"] {
      margin-right: 10px;
      width: 20px;
      height: 20px;
      accent-color: #ffc107;
    }
    
    .correct-option {
      border-color: #4caf50;
      background-color: rgba(76, 175, 80, 0.1);
    }
    
    .correct {
      color: #4caf50;
      font-weight: bold;
    }
    
    .wrong {
      color: #f44336;
      font-weight: bold;
    }
    
    .feedback {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background-color: #252525;
      border-left: 4px solid #444;
      font-size: 0.95rem;
    }

    .progress-container {
      width: 100%;
      background-color: #2d2d2d;
      border-radius: 25px;
      margin: 25px 0;
      height: 35px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    
    .progress-bar {
      height: 100%;
      border-radius: 25px;
      text-align: center;
      line-height: 35px;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      width: 0%;
      transition: width 1s ease-in-out;
      background: linear-gradient(90deg, #ffc107, #ff9800);
      min-width: 35px;
    }

    #timer {
      font-size: 1.1rem;
      font-weight: bold;
      color: #64b5f6;
      position: sticky;
      top: 10px;
      z-index: 100;
      background-color: rgba(26, 26, 26, 0.95);
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      border: 2px solid #ffc107;
      font-family: 'Courier New', monospace;
      text-align: center;
      backdrop-filter: blur(10px);
      margin-bottom: 20px;
      width: auto;
      display: inline-block;
      left: 50%;
      transform: translateX(-50%);
      position: relative;
    }

    button {
      margin: 30px auto;
      padding: 18px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #ffc107, #ff9800);
      color: #121212;
      cursor: pointer;
      display: block;
      width: 90%;
      max-width: 300px;
      transition: all 0.3s;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
      letter-spacing: 1px;
      touch-action: manipulation;
    }
    
    button:active {
      transform: scale(0.98);
      background: linear-gradient(135deg, #e6b006, #e68a00);
    }

    pre[class*="language-"] {
      background-color: #1a1a1a !important;
      border: 1px solid #333;
      border-radius: 8px;
      margin: 15px 0;
      padding: 15px !important;
      font-size: 0.85rem;
      line-height: 1.4;
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    code[class*="language-"] {
      font-size: 0.85rem;
      text-shadow: none !important;
      color: #e0e0e0;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }

    ::selection {
      background-color: rgba(255, 193, 7, 0.3);
      color: white;
    }

    .question label {
      user-select: none;
      -webkit-user-select: none;
    }

    @media (min-width: 768px) and (max-width: 1024px) {
      body {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      
      h1 {
        font-size: 1.8rem;
      }
      
      .question p {
        font-size: 1.2rem;
      }
      
      pre[class*="language-"] {
        font-size: 0.9rem;
      }
      
      button {
        width: 70%;
        max-width: 400px;
      }
    }

    @media (max-width: 767px) {
      @media (max-width: 360px) {
        body {
          padding: 10px;
        }
        
        .question {
          padding: 12px;
        }
        
        label {
          padding: 12px;
          font-size: 0.95rem;
          min-height: 50px;
        }
        
        button {
          width: 95%;
          padding: 16px;
          font-size: 1.1rem;
        }
        
        h1 {
          font-size: 1.3rem;
        }
        
        .judge-options {
          flex-direction: column;
          gap: 10px;
        }
      }
      
      @media (max-height: 500px) and (orientation: landscape) {
        body {
          padding: 10px;
        }
        
        .question {
          margin-bottom: 15px;
          padding: 12px;
        }
        
        label {
          padding: 10px 12px;
          min-height: 45px;
          font-size: 0.9rem;
        }
        
        #timer {
          top: 5px;
          padding: 8px 12px;
          font-size: 1rem;
        }
        
        h1 {
          font-size: 1.2rem;
          margin-bottom: 15px;
        }
      }
      
      .question:last-child {
        margin-bottom: 100px;
      }
      
      label, button {
        -webkit-touch-callout: none;
      }
      
      html {
        font-size: 16px;
      }
    }

    @media (min-width: 1200px) {
      body {
        max-width: 1000px;
        margin: 0 auto;
        padding: 30px;
      }
      
      .question {
        padding: 20px;
      }
      
      button {
        max-width: 400px;
      }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0a0a0a;
      }
      
      .question, .feedback {
        background-color: #151515;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }

    .MathJax {
      color: #e0e0e0 !important;
      font-size: 1.1em !important;
    }
    
    mjx-container {
      overflow-x: auto;
      overflow-y: hidden;
    }
  </style>
</head>
<body>
  <h1>2026年3月 一级 判断题（每题 2 分，共 20 分）</h1>

  <div id="timer" style="position: relative; transform: none; left: auto; display: block; text-align: center;">剩余时间：15:00</div>

  <div id="quiz"></div>
  <button onclick="submitQuiz()">提交答案</button>

  <h2 id="result"></h2>
  <div class="progress-container">
    <div id="progress-bar" class="progress-bar">0%</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>

  <script>
    const questions = [
      {
        text: "第1题小明的妈妈最近刚刚给他买了一块电话手表，除了可以看时间，小明也可以用它和妈妈打电话、收发信息，那么可以推测这块手表中装有一款特定操作系统。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [0],
        rule: "all",
        score: 2,
        code: ``
      },
      {
        text: "第2题C++表达式 4%2 和 2*2%2 的结果相同。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [0],
        rule: "all",
        score: 2,
        code: ``
      },
      {
        text: "第3题下面C++代码段成功执行后将输出0。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [1],
        rule: "all",
        score: 2,
        code: `for (i = 1; i < 10; i++)\n    if (i % 3 == 0)\n        break;\ncout << i;`
      },
      {
        text: "第4题下面能够正常执行的C++代码段用于求1到N之和，N为正整数。因为 i< N+1 ，所以是1到N且包含N之和。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [1],
        rule: "all",
        score: 2,
        code: `tnt = 0;\ncout << "请输入正整数:"\ncin >> N;\ntotal = 0;\nfor (i = 1; i < N + 1; i++) ;\n    total += i;\ncout << total;`
      },
      {
        text: "第5题执行下面的C++代码段，其语句cout<<（N）将被执行0次或无数次（即死循环）。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [0],
        rule: "all",
        score: 2,
        code: `cin >> N;\nwhile (N)\n    cout << (N);`
      },
      {
        text: "第6题下面的C++代码段的变量都是整型，它能用于判断输入的正整数是否为对称数。所谓对称数是指从左到右和从右到左读该数，其值相同。例如，121和414都是对称数，而123不是对称数。（）",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [0],
        rule: "all",
        score: 2,
        code: `cout << "请输入正整数:";\ncin >> n;\nold_number = n;\nnew_number = 0;\nwhile (n != 0){\n    new_number = new_number * 10 + n % 10;\n    n /= 10;\n}\nif (old_number == new_number)\n    cout << "对称数";\nelse\n    cout << "非对称数";`
      },
      {
        text: "第7题执行下面的C++代码段，如果变量都为整型变量，输入为大于0的整数，则输出数值一定为-N的值。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [0],
        rule: "all",
        score: 2,
        code: `cin >> N;\ntotal = 0;\nfor (i = -N; i < N; i += 2)\n    total += i;\ncout << total;`
      },
      {
        text: "第8题执行C++语句printf（\"%d\\n\"，3.14）将报错。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [1],
        rule: "all",
        score: 2,
        code: ``
      },
      {
        text: "第9题执行下面的C++代码后将输出2500。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [0],
        rule: "all",
        score: 2,
        code: `int cnt = 0;\nfor (int i = 1; i < 100; i++)\n    cnt += i++;\ncout << cnt;`
      },
      {
        text: "第10题小明在测试C++的printf的功能时执行了printf（\"%-5d\\n\"，314），则代码输出的结果是-5314。",
        options: [
          { text: "A. 正确", code: "" },
          { text: "B. 错误", code: "" }
        ],
        answer: [1],
        rule: "all",
        score: 2,
        code: ``
      }
    ];

    // 渲染题目
    const quizDiv = document.getElementById("quiz");
    questions.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "question";
      
      let html = `<p id="q${i}-text">${q.text} <small>（${q.score}分）</small></p>`;
      
      if (q.code && q.code.trim() !== "") {
        html += `<pre><code class="language-cpp">${q.code}</code></pre>`;
      }
      
      html += `<div class="judge-options">`;
      q.options.forEach((opt, j) => {
        html += `<label>
                  <input type="radio" name="q${i}" value="${j}">
                  ${opt.text}
                </label>`;
      });
      html += `</div>`;
      html += `<p class="feedback" id="feedback${i}"></p>`;
      
      div.innerHTML = html;
      quizDiv.appendChild(div);
    });

    if (typeof Prism !== 'undefined') {
      Prism.highlightAll();
    }

    if (window.MathJax) {
      MathJax.typeset();
    }

    // 提交判分
    function submitQuiz(auto = false) {
      let totalScore = 0;
      let maxScore = questions.reduce((sum, q) => sum + q.score, 0);

      questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        let isCorrect = false;
        
        if (selected) {
          const selectedValue = parseInt(selected.value);
          isCorrect = q.answer.includes(selectedValue);
        }
        
        if (isCorrect) totalScore += q.score;
        const correctText = q.answer.map(idx => q.options[idx].text).join("，");

        document.getElementById(`feedback${i}`).innerHTML = isCorrect
          ? `<span class='correct'>✔ 正确 (${q.score}分)</span> 正确答案：${correctText}`
          : `<span class='wrong'>✘ 错误 (0分)</span> 正确答案：${correctText}`;
      });

      const percent = Math.round((totalScore / maxScore) * 100);
      const bar = document.getElementById("progress-bar");
      bar.style.width = percent + "%";
      bar.innerText = percent + "%";
      
      if (percent < 50) {
        bar.style.background = "linear-gradient(90deg, #f44336, #d32f2f)";
      } else if (percent < 80) {
        bar.style.background = "linear-gradient(90deg, #ff9800, #f57c00)";
      } else {
        bar.style.background = "linear-gradient(90deg, #4caf50, #2e7d32)";
      }

      document.getElementById("result").innerText = 
        (auto ? "⏰ 时间到，已自动提交！ " : "") + `总分：${totalScore}/${maxScore}`;

      clearInterval(timerInterval);
      
      if ('scrollBehavior' in document.documentElement.style) {
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: 'smooth'
        });
      } else {
        window.scrollTo(0, document.body.scrollHeight);
      }
    }

    // 倒计时
    let timeLeft = 900;
    const timerDiv = document.getElementById("timer");
    
    function formatTime(s) {
      const m = String(Math.floor(s / 60)).padStart(2, "0");
      const sec = String(s % 60).padStart(2, "0");
      return `${m}:${sec}`;
    }

    const timerInterval = setInterval(() => {
      timeLeft--;
      timerDiv.innerText = `剩余时间：${formatTime(timeLeft)}`;
      
      if (timeLeft <= 60) {
        timerDiv.style.color = "#f44336";
        timerDiv.style.borderColor = "#f44336";
        timerDiv.style.background = "rgba(244, 67, 54, 0.1)";
      } else if (timeLeft <= 300) {
        timerDiv.style.color = "#ff9800";
        timerDiv.style.borderColor = "#ff9800";
        timerDiv.style.background = "rgba(255, 152, 0, 0.1)";
      }
      
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        submitQuiz(true);
      }
    }, 1000);

    timerDiv.innerText = `剩余时间：${formatTime(timeLeft)}`;
  </script>
</body>
</html>
