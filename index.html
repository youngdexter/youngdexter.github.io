<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>信息学奥林匹克</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
            background-color: #0a0f1a;
            color: #e0e0e0;
            overflow-x: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* 轮播容器 - 全屏覆盖 */
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 轮播背景 - 固定定位 */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            --before-bg: url('img/background1.jpg');
        }

        .slideshow::before,
        .slideshow::after {
            content: "";
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slideshow::before {
            background-image: var(--before-bg);
            opacity: 1;
        }

        .slideshow::after {
            background-image: var(--after-bg, url('img/background2.jpg'));
        }

        .slideshow.show-after::before { opacity: 0; }
        .slideshow.show-after::after { opacity: 1; }

        /* 遮罩层 - 增强可读性 */
        .mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* 主要内容容器 - 优化布局，确保内容合理分布 */
        .main-content {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            color: #fff;
            z-index: 2;
            padding: 20px 20px 80px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            height: 100dvh;
            overflow-y: auto;
        }

        /* 隐藏滚动条但保留功能 */
        .main-content::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }

        /* 内容包装器 - 用于垂直居中的主体部分 */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            flex: 1;
            margin: auto 0;
        }

        /* 标题区域 */
        .title-section {
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 1s ease-out;
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
            background: none;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 300;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1.5s ease-out;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 卡片网格布局 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 900px;
            margin: 15px auto;
            animation: fadeInUp 2s ease-out;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 18px 10px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .nav-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .nav-card i {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-card span {
            font-size: 1rem;
            font-weight: 600;
        }

        .nav-card small {
            font-size: 0.7rem;
            opacity: 0.8;
            text-align: center;
            display: none;
        }

        /* 快速访问区域 - 电脑端优化加大间距 */
        .quick-access {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            animation: fadeIn 2.5s ease-out;
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px; /* 电脑端默认加大间距 */
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 14px 25px; /* 增加内边距 */
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .quick-link {
            color: white;
            text-decoration: none;
            font-size: 1rem; /* 电脑端稍微增大字体 */
            font-weight: 500;
            padding: 8px 20px; /* 增加链接内边距 */
            border-radius: 40px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            cursor: pointer;
        }

        .quick-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .quick-link i {
            font-size: 1rem;
        }

        /* 页脚 - 固定在底部 */
        .footer {
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            padding: 8px 0 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            line-height: 1.4;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: auto;
        }

        .footer p {
            margin: 2px 0;
            letter-spacing: 0.5px;
        }

        .footer .links-line {
            font-size: 0.75rem;
            margin-bottom: 3px;
        }

        .footer .copyright-line {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            margin: 0 6px;
            transition: all 0.2s;
            display: inline-block;
            padding: 2px 0;
            position: relative;
            z-index: 11;
        }

        .footer a:hover {
            color: white;
            text-decoration: underline;
            opacity: 1;
        }

        /* 电脑端进一步优化大屏幕显示 */
        @media (min-width: 1200px) {
            .quick-access {
                max-width: 900px;
                margin: 25px auto;
            }
            .quick-links {
                gap: 20px;
                padding: 16px 30px;
            }
            .quick-link {
                font-size: 1.05rem;
                padding: 8px 22px;
            }
        }

        /* 平板端 - 保持合适间距 */
        @media (max-width: 1023px) and (min-width: 768px) {
            .main-title {
                font-size: 2.8rem;
            }
            
            .subtitle {
                font-size: 1.3rem;
            }
            
            .nav-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                max-width: 700px;
                margin: 20px auto;
            }
            
            .quick-access {
                max-width: 700px;
                margin: 20px auto;
            }
            
            .quick-links {
                gap: 14px;
                padding: 12px 22px;
                border-radius: 50px;
            }
            
            .quick-link {
                font-size: 0.95rem;
                padding: 7px 18px;
            }
        }

        /* 手机端 - 保持原有紧凑样式，与电脑端区分 */
        @media (max-width: 767px) {
            body, .slideshow-container, .main-content {
                height: -webkit-fill-available;
                height: 100dvh;
            }
            
            .main-content {
                padding: 10px 12px 70px;
                justify-content: space-between;
            }
            
            .content-wrapper {
                margin: 0;
                padding: 10px 0;
            }
            
            .title-section {
                margin-bottom: 10px;
            }
            
            .main-title {
                font-size: 1.8rem;
                margin-bottom: 0;
            }
            
            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 5px;
            }
            
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 8px;
                max-width: 300px;
                margin: 8px auto;
            }
            
            .nav-card {
                padding: 10px 14px;
                flex-direction: row;
                text-align: left;
                gap: 10px;
            }
            
            .nav-card i {
                font-size: 1.4rem;
                min-width: 32px;
            }
            
            .nav-card div {
                flex: 1;
            }
            
            .nav-card span {
                font-size: 0.9rem;
                display: block;
            }
            
            .nav-card small {
                display: block;
                font-size: 0.65rem;
                margin-top: 2px;
                opacity: 0.7;
            }
            
            /* 手机端快速访问 - 保持紧凑样式 */
            .quick-access {
                margin: 10px auto;
                max-width: 100%;
            }
            
            .quick-links {
                gap: 6px; /* 手机端保持小间隙 */
                padding: 8px 12px; /* 手机端较小内边距 */
                border-radius: 30px;
            }
            
            .quick-link {
                padding: 5px 10px;
                font-size: 0.75rem;
                gap: 4px;
            }
            
            .quick-link i {
                font-size: 0.8rem;
            }
            
            .footer {
                padding: 5px 0 10px;
                font-size: 0.7rem;
            }
            
            .footer .links-line {
                font-size: 0.65rem;
            }
            
            .footer a {
                margin: 0 4px;
            }
        }

        /* 针对 iPhone 特定优化 */
        @supports (-webkit-touch-callout: none) {
            body, .slideshow-container, .main-content {
                height: -webkit-fill-available;
            }
        }

        /* 小屏手机优化 */
        @media (max-width: 374px) {
            .main-title {
                font-size: 1.6rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
            
            .nav-grid {
                max-width: 260px;
            }
            
            .nav-card span {
                font-size: 0.85rem;
            }
            
            .nav-card small {
                font-size: 0.6rem;
            }
            
            .quick-links {
                flex-direction: column;
                align-items: center;
                border-radius: 20px;
                padding: 8px;
                gap: 4px;
            }
            
            .quick-link {
                width: 100%;
                justify-content: center;
                font-size: 0.7rem;
                padding: 4px 6px;
            }
            
            .footer .links-line {
                font-size: 0.6rem;
            }
            
            .footer a {
                margin: 0 3px;
            }
        }

        /* 横屏手机优化 */
        @media (max-height: 600px) and (orientation: landscape) {
            .main-content {
                padding: 5px 15px 60px;
            }
            
            .title-section {
                margin-bottom: 5px;
            }
            
            .main-title {
                font-size: 1.6rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 3px;
            }
            
            .nav-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 550px;
                gap: 8px;
                margin: 5px auto;
            }
            
            .nav-card {
                padding: 8px 10px;
            }
            
            .nav-card i {
                font-size: 1.3rem;
            }
            
            .nav-card span {
                font-size: 0.85rem;
            }
            
            .quick-access {
                margin: 5px auto;
            }
            
            .quick-links {
                padding: 6px 12px;
                gap: 6px;
            }
            
            .quick-link {
                padding: 4px 8px;
                font-size: 0.75rem;
            }
            
            .footer {
                padding: 3px 0 8px;
            }
        }

        /* 动画定义 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 触摸优化 */
        .nav-card, .quick-link, .footer a {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        /* 深色模式支持 */
        @media (prefers-color-scheme: dark) {
            .mask {
                background: rgba(0, 0, 0, 0.7);
            }
        }

        /* 减少动画（无障碍） */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
            
            .slideshow::before,
            .slideshow::after {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <!-- 轮播图背景 -->
    <div class="slideshow-container">
        <div class="slideshow">
            <div class="mask"></div>
        </div>
        
        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 内容包装器 - 用于垂直居中的主体部分 -->
            <div class="content-wrapper">
                <!-- 标题区域 -->
                <div class="title-section">
                    <h1 class="main-title">信息学奥林匹克</h1>
                    <p class="subtitle">National Olympiad in Informatics</p>
                </div>
                
                <!-- 卡片网格导航 - 三列布局 -->
                <div class="nav-grid">
                    <a href="/noi" target="_blank" class="nav-card">
                        <i class="fas fa-trophy"></i>
                        <div>
                            <span>NOI 在线练习</span>
                            <small>全国青少年信息学奥林匹克</small>
                        </div>
                    </a>
                    <a href="/gesp" target="_blank" class="nav-card">
                        <i class="fas fa-book"></i>
                        <div>
                            <span>GESP 单选判断</span>
                            <small>选择题、判断题练习</small>
                        </div>
                    </a>
                    <a href="https://isoft.top" target="_blank" class="nav-card">
                        <i class="fas fa-laptop-code"></i>
                        <div>
                            <span>GESP 程序设计</span>
                            <small>编程练习</small>
                        </div>
                    </a>
                </div>
                
                <!-- 快速访问链接 - 电脑端已优化间距，手机端保持紧凑 -->
                <div class="quick-access">
                    <div class="quick-links">
                        <a href="/study" target="_blank" class="quick-link">
                            <i class="fas fa-play-circle"></i>学习资源
                        </a>
                        <a href="/csp" target="_blank" class="quick-link">
                            <i class="fas fa-history"></i>历年真题
                        </a>
                        <a href="/code" target="_blank" class="quick-link">
                            <i class="fas fa-cog fa-spin"></i>程序代码
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 页脚 - 固定在底部 -->
        <div class="footer">
            <p class="links-line">
                <a href="https://www.noi.cn/" target="_blank">竞赛信息</a> · <a href="/about" target="_blank">关于我们</a> · <a href="/terms" target="_blank">使用条款</a>  
            </p>
            <p class="copyright-line">Copyright &copy; 2025 AoSai All Rights Reserved</p>
        </div>
    </div>

    <script>
        // 轮播图片配置 - 使用本地图片
        const slideshow = document.querySelector(".slideshow");
        const images = [
            "img/background1.jpg",
            "img/background2.jpg", 
            "img/background3.jpg"
        ];
        
        let index = 0;
        let showingBefore = true;

        // 预加载图片
        images.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onerror = function() {
                console.warn('图片加载失败: ' + src);
            };
        });

        // 轮播切换
        setInterval(() => {
            index = (index + 1) % images.length;
            
            if (showingBefore) {
                slideshow.style.setProperty("--after-bg", `url(${images[index]})`);
                slideshow.classList.add("show-after");
            } else {
                slideshow.style.setProperty("--before-bg", `url(${images[index]})`);
                slideshow.classList.remove("show-after");
            }
            
            showingBefore = !showingBefore;
        }, 6000);

        // 平滑滚动到锚点
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                if (targetId !== '#') {
                    document.querySelector(targetId)?.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        // 横屏检测
        window.addEventListener('orientationchange', function() {});
        
        // 触摸优化
        document.addEventListener('touchstart', function() {}, { passive: true });

        // 图片加载失败备用
        function setDefaultBackground() {
            document.querySelector('.slideshow').style.backgroundColor = '#1a1a2e';
        }

        const firstImg = new Image();
        firstImg.src = images[0];
        firstImg.onerror = setDefaultBackground;
        
        // iOS Safari 高度修正
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
        setVH();
    </script>
</body>
</html>
